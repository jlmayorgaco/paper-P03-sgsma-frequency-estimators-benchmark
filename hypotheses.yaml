hypotheses:
  # Global (12)
  - id: H_GLOBAL_01
    title: Global RMSE difference (Model-based vs Loop-based)
    metric: m1_rmse_hz
    group_a: family:Model-based
    group_b: family:Loop-based
    test: mw
    alpha: 0.05
    correction: holm
    mode: preregistered
