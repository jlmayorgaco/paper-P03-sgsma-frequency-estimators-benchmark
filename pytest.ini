[pytest]
minversion = 8.0
addopts = -ra
testpaths =
    src/tests
    tests
norecursedirs =
    .git
    .venv
    .pytest_cache
    __pycache__
    artifacts
    paper
    paper_submit
    tests/montecarlo/temp
markers =
    canonical: Canonical gate tests required for submit readiness.
    legacy: Legacy compatibility tests kept outside canonical gate.
    manual_nightly: Expensive checks reserved for manual/nightly runs.
