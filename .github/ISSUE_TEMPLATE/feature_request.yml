name: Feature request
description: Propose an enhancement to benchmark pipelines, analysis, or plotting.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation are you facing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Scientific/engineering impact
      description: Reproducibility, accuracy, latency, maintainability, etc.
